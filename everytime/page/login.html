<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 페이지</title>
    <link rel="stylesheet" href="../css/login.css" />
  </head>

  <body>
    <div class="allbox">
      <div class="header">
        <img src="../img/logo.png" />
      </div>
      <form class="formTag">
        <div class="box">
          <div class="box1">
            <input
              type="text"
              id="user-id"
              class="id-input"
              placeholder="LIKELION14"
            />
          </div>
          <div class="box2">
            <input
              type="password"
              id="user-password"
              class="password-input"
              placeholder="비밀번호"
            />
          </div>
          <div class="box3">
            <button type="submit" id="user-login" class="login-input">
              에브리타임 로그인
            </button>
          </div>
        </div>
        <p class="word">회원가입</p>
      </form>
      <div class="word-box">
        <span class="word1">이용약관</span>
        <span class="word1">개인정보처리방침</span>
        <span class="word1">문의하기</span>
        <span class="word1">@에브리타임</span>
      </div>
    </div>

    <script src="../js/login.js"></script>
  </body>
</html>
