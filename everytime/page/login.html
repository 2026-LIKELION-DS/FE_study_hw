<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에브리타임 로그인</title>
    <link rel="stylesheet" href="../css/login.css">
    <script src="../js/login.js" defer></script>
</head>
<body>
    <div class="login-container">
        <img src="../img/에타.png" alt="에타 로고" class="eta-logo">
        <h2 class="title">에브리타임</h2>
        <form class="login-form">
            <input type="text" id="userid" class="input-box" placeholder="아이디">
            <input type="password" id="userpw" class="input-box" placeholder="비밀번호">
            <input type="button" id="login-btn" class="submit-btn" value="에브리타임 로그인">
        </form>
        <div class="links">
            <a href="#">아이디/비밀번호 찾기</a>
            <a href="./signup.html">회원가입</a>
        </div>
    </div>
</body>
</html>
