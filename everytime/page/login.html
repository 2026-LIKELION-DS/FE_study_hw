<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에브리타임 로그인</title>
    <link rel="stylesheet" href="../css/login.css">
    <script src="../js/login.js" defer></script>
</head>
<body>
    <div class="login-container">
        <img src="../img/logo.png" alt="에타 로고" class="eta-logo">
        <form class="login-form">
            <input type="text" id="userid" class="input-box" placeholder="아이디">
            <input type="password" id="userpw" class="input-box" placeholder="비밀번호">
            <input type="button" id="login-btn" class="submit-btn" value="에브리타임 로그인">
        </form>

        <div class="options">
            <div class="login">
                <input type="checkbox" class="stay-check">
                <span class="stay-loggedin">로그인 유지</span>
            </div>
            <div class="find">아이디/비밀번호 찾기</div>
        </div>

        <div class="register">회원가입</div>

        <footer class="footer">
            <span class="footer-plain">이용약관</span>
            <span class="footer-bold">개인정보처리방침</span>
            <span class="footer-plain">문의하기</span>
            <span class="footer-bold">&copy; 에브리타임</span>
        </footer>
    </div>
</body>
</html>
