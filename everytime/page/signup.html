<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에브리타임 회원가입</title>
    <link rel="stylesheet" href="../css/signup.css">
    <script src="../js/signup.js" defer></script>
</head>
<body>
    <div class="signup-container">
        <img src="../img/에타.png" alt="에타 로고" class="eta-logo">
        <h2 class="title">에브리타임 회원가입</h2>
        <form class="signup-form">
            <input type="text" id="new-id" class="input-box" placeholder="아이디">
            <input type="password" id="new-pw" class="input-box" placeholder="비밀번호 (8자 이상)">
            <input type="text" id="new-email" class="input-box" placeholder="이메일">
            <input type="button" id="signup-btn" class="submit-btn" value="회원가입">
        </form>
    </div>
</body>
</html>
