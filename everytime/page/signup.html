<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clone - 회원가입 페이지</title>
    <link rel="stylesheet" href="../css/signup.css" />
    <script src="../js/signup.js" defer></script>
</head>
<body>
    <header id="signupInfo">
        <h1>에브리타임 회원가입</h1>

        <div id="oneSentence">
        <p id="explain">에브리타임 계정으로 <div>캠퍼스픽, 에브리타임</div> 등</p>
        </div>

        <p>다양한 대학생 서비스를 모두 이용하실 수 있습니다.</p>
    </header>
    <form id="signupForm">
        <div class="inputBigBox">
            <p>이름</p>
            <input id="userName" class="inputBox" type="text" placeholder="이름을 입력하세요.">
        </div>
        
        <div class="inputBigBox">
            <p>닉네임</p>
            <input id="userNickname" class="inputBox" type="text" placeholder="닉네임을 입력하세요.">
        </div>

        <div class="inputBigBox">
            <p>이메일</p>
            <input id="userEmail" class="inputBox" type="text" placeholder="이메일을 입력하세요.">
        </div>

        <div class="inputBigBox">
            <p>비밀번호</p>
            <input id="userPw" class="inputBox" type="password" placeholder="숫자/문자 조합, 최소 8자 이상">
        </div>

        <div class="inputBigBox">
            <p>비밀번호 재입력</p>
            <input id="userPwCheck" class="inputBox" type="password" placeholder="비밀번호를 재입력하세요.">
        </div>

        <button id="signupBtn">
            <p>회원가입</p>
        </button>
    </form>
    

</body>
</html>
