<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에타 글 상세페이지</title>
    <link rel="stylesheet" href="detail.css">
</head>
<body>
    <div class="allbox">
        <header>
            <div class="top">
            <h1>비밀게시판</h1>
            </div>
        </header>

        <div class="post-box">
        <div class="post-inner">
            <div class="post-top">
            <div class="writer-info">
            <img src="img/anonymous.profile.png" alt="프로필 이미지">
            <div class="writer-text">
                <span class="writer-name">익명</span>
                <span class="writer-time">6분 전</span>
            </div>
            </div>

            <div class="post-menu">
            <span>쪽지</span>
            <span>신고</span>
            </div>
        </div>

        <div class="post-title">이 고양이 알면 고학번</div>
        <div class="post-content">누군지 아는 사람</div>

        <div class="image-list">
            <img src="img/고양이사진1.png" alt="고양이 사진1">
            <img src="img/고양이사진2.png" alt="고양이 사진2">
        </div>

        <div class="reaction-count">
            <span class="like">
            <img src="img/container.articles.vote.red.png" alt="따봉"> 1
            </span>
            <span class="comment">
            <img src="img/container.articles.comment.png" alt="댓글"> 0
            </span>
            <span class="scrap">
            <img src="img/container.articles.scrap.png" alt="스크랩"> 0
            </span>
        </div>

        <div class="action-buttons">
            <button type="button">
            <img src="img/container.articles.buttons.posvote.png" alt="따봉이미지"> 공감</button>
            <button type="button">
            <img src="img/container.articles.buttons.scrap.png" alt="스크랩이미지"> 스크랩</button>
        </div>
        </div>

        <div class="comment-box">
        <input type="text" class="comment-input" placeholder="댓글을 입력하세요.">
        <div class="comment-right">
            <label>
            <input type="checkbox">
            익명
            </label>
            <img src="img/redpencile.png" alt="작성펜 사진">
        </div>
        </div>
    </div>

    <div class="bottom-btn">
        <a href="#" class="list-btn">글 목록</a>
    </div>
    </div>
    </div>
</body>
</html>
