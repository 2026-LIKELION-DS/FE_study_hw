<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DetailPage</title>
    <link rel="stylesheet" href="../css/detail.css">
</head>
<body>
    <section>
        <div class="sectionTilte">
            <h6 class="section1_title">비밀게시판</h6>
        </div>
        <div class="sectionContent">
            <div class="writer">
                <div class="writerImg"><img src="../img/anonymous.profile.png" width="30" height="30">
                </div>
                <div class="writerAbout">
                <p class="writername">익명</p>
                <p class="writeTime">13분 전</p>
                </div>
            </div>
            <div class="secitionContent">
                <p class="contentTitle">쇼미재미따</p>
            </div>
            <div class="sectionContent2">
                요즘 재밌는 프로 많이하네 핱시도 빨리 보고싶음🤩
            </div>
            <div class="reaction">
                <img src="../img/container.articles.vote.png" width="10" alt="likes">
                    <span class="redTxt">0 &nbsp; </span>
                    <img src="../img/container.articles.comment.png" width="10" alt="chat">
                    <span class="blueTxt">3</span>
                    <img src="../img/container.articles.scrap.png" width="10" alt="chat">
                    <span class="yellowTxt">0</span>
            </div>
            <div class="reactionButton">
                <div class="reaction_button1">
                    <img src="../img/container.articles.buttons.posvote.png" width="10" alt="chat">
                    <span class="grayTxt">공감</span></div>
                <div class="reaction_button2">
                    <img src="../img/container.articles.buttons.scrap.png" width="10" alt="chat">
                    <span class="grayTxt">스크랩</span>
                </div>
            </div>

            <div class="comentBox">
                댓글을 입력하세요
            </div>

        </div>
        <div class="sectionComment">

        </div>
        <div class="textList">
            <img src="../img/container.articles.pagination.list.png" 
            width="10" height="10" alt="햄버거바">
            <p class="textlist_style">글 목록</p>
        </div>

    </section>
</body>
</html>
