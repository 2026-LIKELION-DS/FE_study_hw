<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="test.css">
</head>
<body>

  <header>
    <h1>에브리타임</h1>
  </header>

  <nav>
    <ul>
      <li>게시판</li>
      <li>시간표</li>
      <li>강의실</li>
      <li>학점계산기</li>
    </ul>
  </nav>

  <main>

    <!-- 왼쪽 -->
    <section class="main-content">

      <!-- 게시판 목록 -->
      <section class="board-list">
        <div>자유게시판</div>
        <div>비밀게시판</div>
        <div>졸업생게시판</div>
      </section>

      <!-- 비밀게시판 -->
      <section class="board-header">
        <h2>비밀게시판</h2>
        <div class="tags">
          <span>보건증</span>
          <span>마스크</span>
        </div>
      </section>

      <!-- 글쓰기 -->
      <section class="write-box">
        <input type="text" placeholder="새 글을 작성해주세요!" />
      </section>

      <!-- 게시글 -->
      <article class="post">
        <h3>과잠 입고</h3>
        <p>한강 가는 거 오바가</p>
      </article>

      <article class="post">
        <h3>티켓 구매</h3>
        <p>변장으로 구매 가능?</p>
      </article>

    </section>

    <!-- 오른쪽 -->
    <aside>
      <section>
        <h3>실시간 인기 글</h3>
        <p>학교 4년동안...</p>
      </section>

      <section>
        <h3>HOT 게시물</h3>
        <p>식품/뷰티 취준...</p>
      </section>

      <section>
        <h3>BEST 게시판</h3>
        <p>학교 소식</p>
      </section>
    </aside>

  </main>

</body>
</html>
